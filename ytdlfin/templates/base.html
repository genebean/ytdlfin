<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Set theme before CSS loads to prevent flash of wrong theme -->
  <script>
    (function () {
      var stored = localStorage.getItem('ytdlfin-theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', stored || (prefersDark ? 'dark' : 'light'));
    })();
  </script>
  <title>{% block title %}ytdlfin{% endblock %}</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@picocss/pico@2.1.1/css/pico.min.css"
    integrity="sha384-L1dWfspMTHU/ApYnFiMz2QID/PlP1xCW9visvBdbEkOLkSSWsP6ZJWhPw6apiXxU"
    crossorigin="anonymous"
  />
  <script
    src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.4/dist/htmx.min.js"
    integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+"
    crossorigin="anonymous"
  ></script>
  <style>
    :root { --spacing: 1rem; }
    nav .brand { font-weight: bold; font-size: 1.1rem; text-decoration: none; color: inherit; }
    .badge { display: inline-block; padding: 0.15em 0.5em; border-radius: 0.3em; font-size: 0.8em; font-weight: 600; }
    .badge-pending  { background: var(--pico-muted-background); color: var(--pico-muted-color); }
    .badge-downloading { background: var(--pico-primary-background); color: var(--pico-primary); }
    .badge-done     { background: #d4edda; color: #155724; }
    .badge-failed   { background: #f8d7da; color: #721c24; }
    .badge-skipped  { background: #fff3cd; color: #856404; }
    .flash-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; padding: 0.75rem 1rem; border-radius: var(--pico-border-radius); margin-bottom: 1rem; }
    .flash-error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; padding: 0.75rem 1rem; border-radius: var(--pico-border-radius); margin-bottom: 1rem; }
    .flash-info    { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; padding: 0.75rem 1rem; border-radius: var(--pico-border-radius); margin-bottom: 1rem; }
    .overflow-x { overflow-x: auto; }
    td, th { white-space: nowrap; }
    td.wrap, th.wrap { white-space: normal; max-width: 22rem; overflow: hidden; text-overflow: ellipsis; }
    /* htmx loading indicator — hidden until a request is in flight */
    .htmx-indicator { opacity: 0; transition: opacity 200ms; }
    .htmx-request.htmx-indicator { opacity: 1; }
    /* Dark mode overrides for hardcoded badge/flash colors */
    [data-theme="dark"] .badge-done    { background: #0d2b14; color: #6ece8a; }
    [data-theme="dark"] .badge-failed  { background: #2b0d0e; color: #e87b80; }
    [data-theme="dark"] .badge-skipped { background: #2b2200; color: #d4a017; }
    [data-theme="dark"] .flash-success { background: #0d2b14; color: #6ece8a; border-color: #1a4a22; }
    [data-theme="dark"] .flash-error   { background: #2b0d0e; color: #e87b80; border-color: #4a1a1c; }
    [data-theme="dark"] .flash-info    { background: #0d2030; color: #6ab0c8; border-color: #1a3a4a; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <header class="container">
    <nav>
      <ul>
        <li><a href="/" class="brand">ytdlfin</a></li>
      </ul>
      <ul>
        <li><a href="/">Queue</a></li>
        <li><a href="/history">History</a></li>
        {% if user and user.is_admin %}
        <li><a href="/admin">Admin</a></li>
        {% endif %}
        <li>
          <button id="theme-toggle" class="outline secondary" style="padding:0.3em 0.7em;font-size:1rem;line-height:1;border:none;background:none;cursor:pointer" onclick="toggleTheme()" aria-label="Toggle light/dark theme"></button>
        </li>
        {% if user %}
        <li>
          <form action="/auth/logout" method="post" style="margin:0">
            <button type="submit" class="outline secondary" style="padding:0.3em 0.8em;font-size:0.9em">Logout</button>
          </form>
        </li>
        {% endif %}
      </ul>
    </nav>
  </header>

  <main class="container">
    {% for msg in flash_messages %}
    <div class="flash-{{ msg.category }}">{{ msg.message }}</div>
    {% endfor %}

    {% block content %}{% endblock %}
  </main>

  <script>
    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      var btn = document.getElementById('theme-toggle');
      if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
    }

    function toggleTheme() {
      var current = document.documentElement.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      localStorage.setItem('ytdlfin-theme', next);
      applyTheme(next);
    }

    // Initialise toggle icon to match the already-applied theme.
    applyTheme(document.documentElement.getAttribute('data-theme') || 'light');

    // Follow system preference changes unless the user has made an explicit choice.
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
      if (!localStorage.getItem('ytdlfin-theme')) {
        applyTheme(e.matches ? 'dark' : 'light');
      }
    });
  </script>
</body>
</html>
