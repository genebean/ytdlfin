<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Set theme before CSS loads to prevent flash of wrong theme -->
  <script>
    (function () {
      var stored = localStorage.getItem('ytdlfin-theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', stored || (prefersDark ? 'dark' : 'light'));
    })();
  </script>
  <title>{% block title %}ytdlfin{% endblock %}</title>
  <link rel="icon" href="/static/favicon-32.png" type="image/png" sizes="32x32" />
  <link rel="apple-touch-icon" href="/static/favicon-180.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@picocss/pico@2.1.1/css/pico.min.css"
    integrity="sha384-L1dWfspMTHU/ApYnFiMz2QID/PlP1xCW9visvBdbEkOLkSSWsP6ZJWhPw6apiXxU"
    crossorigin="anonymous"
  />
  <script
    src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.4/dist/htmx.min.js"
    integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+"
    crossorigin="anonymous"
  ></script>
  <style>
    /* === Brand color tokens === */
    :root {
      --spacing: 1rem;
      --yt-pink:         #e040a8;
      --yt-purple:       #8b5cf6;
      --yt-blue:         #38b8f2;
      --yt-gradient:     linear-gradient(90deg, var(--yt-pink), var(--yt-purple), var(--yt-blue));
      --yt-gradient-135: linear-gradient(135deg, var(--yt-pink) 0%, var(--yt-purple) 50%, var(--yt-blue) 100%);
      --yt-surface:      #eceef8;
      --yt-card:         #f4f5fc;
      --yt-nav:          rgba(240,241,251,0.92);
      --yt-border:       #d8daea;
      --yt-text:         #1a1c2e;
      --yt-muted:        #6b7280;
    }
    [data-theme="dark"] {
      --yt-surface:      #0e0f1a;
      --yt-card:         #161827;
      --yt-nav:          rgba(14,15,26,0.88);
      --yt-border:       #2a2d44;
      --yt-text:         #e8eaf6;
      --yt-muted:        #8891b0;
      /* Pico dark mode overrides */
      --pico-background-color:      #0e0f1a;
      --pico-card-background-color: #161827;
      --pico-muted-background:      #1e1f35;
      --pico-muted-border-color:    #2a2d44;
    }

    /* Pico light mode overrides */
    :root {
      --pico-background-color:      #eceef8;
      --pico-card-background-color: #f4f5fc;
    }

    /* === Body === */
    body { background-color: var(--yt-surface); }

    /* === Sticky nav with frosted glass + gradient underline === */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--yt-nav);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--yt-border);
    }
    header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--yt-gradient);
      pointer-events: none;
    }

    /* === Brand === */
    nav .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.3em;
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      text-decoration: none;
      letter-spacing: -0.02em;
    }
    .brand-ytdl { color: var(--yt-text); }
    .brand-fin {
      background: var(--yt-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }

    /* === Nav links === */
    nav ul { list-style: none; }
    nav a:not(.brand) {
      color: var(--yt-muted);
      text-decoration: none;
      font-size: 0.95rem;
      transition: color 0.15s;
    }
    nav a:not(.brand):hover { color: var(--yt-blue); }
    nav a.nav-active { color: var(--yt-blue) !important; font-weight: 600; }

    /* === Theme picker === */
    .theme-picker {
      display: inline-flex;
      border: 1px solid var(--yt-border);
      border-radius: var(--pico-border-radius);
      overflow: hidden;
    }
    .theme-picker button {
      background: none;
      border: none;
      border-right: 1px solid var(--yt-border);
      padding: 0.2em 0.55em;
      font-size: 0.8rem;
      line-height: 1.6;
      cursor: pointer;
      color: var(--yt-muted);
      margin: 0;
      transition: background 0.15s, color 0.15s;
    }
    .theme-picker button:last-child { border-right: none; }
    .theme-picker button.active {
      background: var(--yt-gradient-135);
      color: white;
    }
    .theme-picker button:hover:not(.active) {
      background: var(--yt-border);
      color: var(--yt-text);
    }

    /* === Page hero (main page) === */
    .page-hero { text-align: center; padding: 2rem 0 1.5rem; }
    .page-hero h2 {
      font-family: 'Sora', sans-serif;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      background: var(--yt-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      margin-bottom: 0.35rem;
      border: none;
      padding: 0;
    }
    .page-hero .tagline { color: var(--yt-muted); margin: 0; font-size: 1rem; }
    .page-hero .jellyfin-ref { color: var(--yt-blue); font-weight: 600; }

    /* === Forms === */
    input[type="url"]:focus,
    input[type="text"]:focus,
    select:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.3);
      border-color: var(--yt-purple) !important;
    }
    input[type="url"] { font-size: 1.05rem; }

    /* Gradient primary button */
    button[type="submit"]:not(.outline):not([class*="secondary"]):not([class*="contrast"]),
    .btn-gradient {
      background: var(--yt-gradient-135) !important;
      border-color: transparent !important;
      color: white !important;
      font-weight: 600;
      transition: opacity 0.15s, transform 0.1s;
    }
    button[type="submit"]:not(.outline):not([class*="secondary"]):not([class*="contrast"]):hover:not(:disabled),
    .btn-gradient:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }
    button[type="submit"]:not(.outline):not([class*="secondary"]):not([class*="contrast"]):active:not(:disabled),
    .btn-gradient:active { transform: translateY(0); }
    button[type="submit"]:disabled { opacity: 0.45; cursor: not-allowed; }

    /* === Status badges — pill shape === */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 0.2em 0.65em;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border: 1px solid transparent;
    }
    .badge-pending     { background: #ebebf5; color: #5c5f80; border-color: #d4d5ec; }
    .badge-downloading { background: #e0f0ff; color: #1a6aaa; border-color: #b8d8f8; }
    .badge-done        { background: #e0f7ec; color: #0f6b3a; border-color: #b6e8cf; }
    .badge-failed      { background: #fde8ea; color: #8b1a25; border-color: #f7bdc2; }
    .badge-skipped     { background: #fef7e0; color: #7a5c00; border-color: #f5e09e; }

    [data-theme="dark"] .badge-pending     { background: #1e1f35; color: #9ea3c8; border-color: #2e3052; }
    [data-theme="dark"] .badge-downloading { background: #0d1e38; color: #6ab4f2; border-color: #1a3560;
                                             animation: badge-pulse 2s ease-in-out infinite; }
    [data-theme="dark"] .badge-done        { background: #0a2219; color: #4dca82; border-color: #134730; }
    [data-theme="dark"] .badge-failed      { background: #2a0d12; color: #f08090; border-color: #4a1a22; }
    [data-theme="dark"] .badge-skipped     { background: #251e05; color: #d4aa30; border-color: #443800; }

    @keyframes badge-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.6; }
    }

    /* === Flash messages === */
    .flash-success { background: #e0f7ec; color: #0f6b3a; border: 1px solid #b6e8cf; padding: 0.75rem 1rem; border-radius: var(--pico-border-radius); margin-bottom: 1rem; }
    .flash-error   { background: #fde8ea; color: #8b1a25; border: 1px solid #f7bdc2; padding: 0.75rem 1rem; border-radius: var(--pico-border-radius); margin-bottom: 1rem; }
    .flash-info    { background: #e0f4ff; color: #1a5a7a; border: 1px solid #b8ddf8; padding: 0.75rem 1rem; border-radius: var(--pico-border-radius); margin-bottom: 1rem; }
    [data-theme="dark"] .flash-success { background: #0a2219; color: #4dca82;  border-color: #134730; }
    [data-theme="dark"] .flash-error   { background: #2a0d12; color: #f08090;  border-color: #4a1a22; }
    [data-theme="dark"] .flash-info    { background: #0d1e38; color: #6ab4f2;  border-color: #1a3560; }

    /* === Tables === */
    .overflow-x { overflow-x: auto; width: 100%; }
    td, th { white-space: nowrap; }
    td.wrap, th.wrap { white-space: normal; max-width: 22rem; overflow: hidden; text-overflow: ellipsis; }

    /* === Queue row left-border status differentiation === */
    .status-pending td:first-child     { border-left: 3px solid var(--yt-muted); }
    .status-downloading td:first-child { border-left: 3px solid var(--yt-blue); }

    /* Hide secondary queue columns on mobile */
    @media (max-width: 640px) {
      .col-quality, .col-requested-by { display: none; }
    }

    /* === Empty state === */
    .empty-state {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--yt-muted);
    }
    .empty-state .empty-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .empty-state p { margin: 0.25rem 0; }
    .empty-state .empty-hint { font-size: 0.9rem; opacity: 0.8; }

    /* === History status filter pills === */
    .status-pills { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.25rem; }
    .status-pill {
      display: inline-block;
      padding: 0.25em 0.85em;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 500;
      text-decoration: none;
      border: 1px solid var(--yt-border);
      color: var(--yt-muted);
      transition: all 0.15s;
    }
    .status-pill:hover { border-color: var(--yt-purple); color: var(--yt-purple); }
    .status-pill.active {
      background: var(--yt-gradient-135);
      border-color: transparent;
      color: white;
      font-weight: 600;
    }

    /* === Expandable details in history === */
    .error-summary,
    .path-summary {
      display: inline;
      cursor: pointer;
      font-size: 0.85em;
      list-style: none;
    }
    .error-summary { color: #f08090; }
    .path-summary  { color: var(--yt-muted); }
    .error-summary::-webkit-details-marker,
    .path-summary::-webkit-details-marker { display: none; }

    /* === HTMX loading indicator === */
    .htmx-indicator { opacity: 0; transition: opacity 200ms; }
    .htmx-request.htmx-indicator { opacity: 1; }

    /* === Footer === */
    footer {
      margin-top: 3rem;
      padding: 1.5rem 0;
      text-align: center;
      font-size: 0.85em;
      color: var(--yt-muted);
      border-top: 1px solid var(--yt-border);
    }
    footer a { color: inherit; text-decoration: none; }
    footer a:hover { color: var(--yt-blue); }

    /* === Hamburger === */
    .nav-hamburger {
      display: none;
      background: none;
      border: 1px solid var(--yt-border);
      border-radius: var(--pico-border-radius);
      padding: 0.25em 0.55em;
      font-size: 1.1rem;
      line-height: 1;
      cursor: pointer;
      color: inherit;
      margin: 0;
      transition: border-color 0.15s;
    }
    .nav-hamburger:hover { border-color: var(--yt-purple); }
    @media (max-width: 640px) {
      nav > ul:first-child { width: 100%; justify-content: space-between; }
      .nav-hamburger { display: block; }
      nav { position: relative; }
      nav > ul.nav-links {
        display: none;
        position: absolute;
        top: calc(100% + 0.25rem);
        right: 0;
        z-index: 200;
        flex-direction: column;
        gap: 0.25rem;
        width: max-content;
        max-width: calc(100vw - 2rem);
        padding: 0.75rem 1rem;
        background: var(--yt-card);
        border: 1px solid var(--yt-border);
        border-top: 2px solid var(--yt-purple);
        border-radius: var(--pico-border-radius);
        box-shadow: 0 4px 24px rgba(0,0,0,0.2);
      }
      nav > ul.nav-links.open { display: flex; }
      nav > ul.nav-links li { list-style: none; }
      nav > ul.nav-links li form { margin: 0; }
      nav > ul.nav-links li > a { display: block; padding: 0.25rem 0; }
      nav > ul.nav-links li > button,
      nav > ul.nav-links li > form > button { width: 100%; text-align: left; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <header class="container">
    <nav>
      <ul>
        <li>
          <a href="/" class="brand">
            <img src="/static/ytdlfin-icon.png" alt="" aria-hidden="true" width="24" height="24" style="flex-shrink:0;border-radius:4px" />
            <span class="brand-ytdl">ytdl</span><span class="brand-fin">fin</span>
          </a>
        </li>
        <li>
          <button id="nav-toggle" class="nav-hamburger" aria-label="Menu" aria-expanded="false" onclick="toggleNav()">☰</button>
        </li>
      </ul>
      <ul class="nav-links" id="nav-links">
        <li><a href="/" class="{% if request.url.path == '/' %}nav-active{% endif %}">Queue</a></li>
        <li><a href="/history" class="{% if request.url.path == '/history' %}nav-active{% endif %}">History</a></li>
        {% if user and user.is_admin %}
        <li><a href="/admin" class="{% if request.url.path == '/admin' %}nav-active{% endif %}">Admin</a></li>
        {% endif %}
        <li>
          <div class="theme-picker" role="group" aria-label="Theme">
            <button type="button" id="theme-auto"  onclick="setThemeMode('auto')">auto</button>
            <button type="button" id="theme-light" onclick="setThemeMode('light')">☀️</button>
            <button type="button" id="theme-dark"  onclick="setThemeMode('dark')">🌙</button>
          </div>
        </li>
        {% if user %}
        <li>
          <form action="/auth/logout" method="post" style="margin:0">
            <button type="submit" class="outline secondary" style="padding:0.3em 0.8em;font-size:0.9em">Logout</button>
          </form>
        </li>
        {% endif %}
      </ul>
    </nav>
  </header>

  <main class="container">
    {% for msg in flash_messages %}
    <div class="flash-{{ msg.category }}">{{ msg.message }}</div>
    {% endfor %}

    {% block content %}{% endblock %}
  </main>

  <footer class="container">
    <a href="https://github.com/genebean/ytdlfin" target="_blank" rel="noopener">ytdlfin on GitHub</a>
  </footer>

  <script>
    function systemPrefersDark() {
      return window.matchMedia('(prefers-color-scheme: dark)').matches;
    }
    function applyTheme(theme, stored) {
      document.documentElement.setAttribute('data-theme', theme);
      var mode = stored === null ? 'auto' : stored;
      ['auto', 'light', 'dark'].forEach(function (m) {
        var btn = document.getElementById('theme-' + m);
        if (btn) btn.classList.toggle('active', m === mode);
      });
    }
    function setThemeMode(mode) {
      if (mode === 'auto') {
        localStorage.removeItem('ytdlfin-theme');
        applyTheme(systemPrefersDark() ? 'dark' : 'light', null);
      } else {
        localStorage.setItem('ytdlfin-theme', mode);
        applyTheme(mode, mode);
      }
    }
    function toggleNav() {
      var links = document.getElementById('nav-links');
      var btn = document.getElementById('nav-toggle');
      var open = links.classList.toggle('open');
      btn.setAttribute('aria-expanded', String(open));
    }
    document.addEventListener('click', function (e) {
      var links = document.getElementById('nav-links');
      var toggle = document.getElementById('nav-toggle');
      if (links && toggle && !links.contains(e.target) && !toggle.contains(e.target)) {
        links.classList.remove('open');
        toggle.setAttribute('aria-expanded', 'false');
      }
    });
    var _stored = localStorage.getItem('ytdlfin-theme');
    applyTheme(document.documentElement.getAttribute('data-theme') || 'light', _stored);
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
      if (!localStorage.getItem('ytdlfin-theme')) {
        applyTheme(e.matches ? 'dark' : 'light', null);
      }
    });
  </script>
</body>
</html>
