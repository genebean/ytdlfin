{% extends "base.html" %}
{% block title %}ytdlfin — Download{% endblock %}

{% block content %}
<div class="page-hero">
  <h2>Queue a download</h2>
  <p class="tagline">Paste a URL to add it to the <span class="jellyfin-ref">Jellyfin</span> download queue</p>
</div>

<form action="/downloads" method="post">
  <label for="url">Video URL</label>
  <input
    type="url"
    id="url"
    name="url"
    placeholder="https://www.youtube.com/watch?v=…"
    required
    autofocus
    hx-get="/api/resolutions"
    hx-trigger="blur"
    hx-target="#quality-wrapper"
    hx-swap="innerHTML"
    hx-indicator="#quality-loading"
    hx-include="this"
  />

  <label for="custom_title">Custom title <small>(optional — overrides the video's title in Jellyfin)</small></label>
  <input
    type="text"
    id="custom_title"
    name="custom_title"
    placeholder="Leave blank to use the video's title"
  />

  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(14rem,1fr));gap:1rem;align-items:end">
    <div>
      <label for="category_id">Category <small id="category-desc" style="font-weight:normal;color:var(--yt-muted)"></small></label>
      <select id="category_id" name="category_id" required onchange="updateCategoryDesc(this)">
        {% if categories %}
          {% for cat in categories %}
          <option value="{{ cat.id }}" data-description="{{ cat.description or '' }}">{{ cat.name }}</option>
          {% endfor %}
        {% else %}
          <option disabled value="">No categories — ask an admin to add one</option>
        {% endif %}
      </select>
    </div>

    <div>
      <label for="quality">
        Quality
        <span id="quality-loading" class="htmx-indicator" style="font-size:0.8em;font-weight:normal;margin-left:0.4em">fetching…</span>
      </label>
      <div id="quality-wrapper">
        {% include "partials/quality_select.html" %}
      </div>
    </div>
  </div>

  <button type="submit" {% if not categories %}disabled{% endif %}>Queue download</button>
</form>

<script>
  function updateCategoryDesc(sel) {
    var desc = sel.options[sel.selectedIndex].getAttribute('data-description');
    document.getElementById('category-desc').textContent = desc || '';
  }
  document.addEventListener('DOMContentLoaded', function () {
    var sel = document.getElementById('category_id');
    if (sel && sel.options.length) updateCategoryDesc(sel);
  });
</script>

<hr />
<h3>Active downloads</h3>

<div
  id="queue-section"
  hx-get="/api/queue"
  hx-trigger="every 3s"
  hx-target="#queue-section"
  hx-swap="innerHTML"
>
  {% include "queue_partial.html" %}
</div>
{% endblock %}
