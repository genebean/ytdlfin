<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    (function () {
      var stored = localStorage.getItem('ytdlfin-theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', stored || (prefersDark ? 'dark' : 'light'));
    })();
  </script>
  <title>ytdlfin — Login</title>
  <link rel="icon" href="/static/favicon-32.png" type="image/png" sizes="32x32" />
  <link rel="apple-touch-icon" href="/static/favicon-180.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@picocss/pico@2.1.1/css/pico.min.css"
    integrity="sha384-L1dWfspMTHU/ApYnFiMz2QID/PlP1xCW9visvBdbEkOLkSSWsP6ZJWhPw6apiXxU"
    crossorigin="anonymous"
  />
  <style>
    :root {
      --yt-pink:         #e040a8;
      --yt-purple:       #8b5cf6;
      --yt-blue:         #38b8f2;
      --yt-gradient:     linear-gradient(90deg, var(--yt-pink), var(--yt-purple), var(--yt-blue));
      --yt-gradient-135: linear-gradient(135deg, var(--yt-pink) 0%, var(--yt-purple) 50%, var(--yt-blue) 100%);
      --yt-surface:      #f4f5f9;
      --yt-card:         #ffffff;
      --yt-border:       #e2e4ee;
      --yt-text:         #1a1c2e;
      --yt-muted:        #6b7280;
    }
    [data-theme="dark"] {
      --yt-surface:      #0e0f1a;
      --yt-card:         #161827;
      --yt-border:       #2a2d44;
      --yt-text:         #e8eaf6;
      --yt-muted:        #8891b0;
      --pico-background-color:      #0e0f1a;
      --pico-card-background-color: #161827;
    }

    body {
      background: var(--yt-surface);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-wrap {
      width: 100%;
      max-width: 22rem;
      padding: 1rem;
    }

    .login-brand {
      text-align: center;
      margin-bottom: 2rem;
    }

    .brand-logo { display: block; margin: 0 auto 0.75rem; }

    .brand-name {
      font-family: 'Sora', sans-serif;
      font-weight: 800;
      font-size: 2rem;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .brand-ytdl { color: var(--yt-text); }
    .brand-fin {
      background: var(--yt-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }

    .tagline { color: var(--yt-muted); font-size: 0.9rem; margin: 0.5rem 0 0; }
    .jellyfin-ref { color: var(--yt-blue); font-weight: 600; }

    .login-card {
      background: var(--yt-card);
      border: 1px solid var(--yt-border);
      border-radius: 0.75rem;
      padding: 2rem;
    }

    .btn-gradient {
      display: block;
      width: 100%;
      padding: 0.75rem 1.5rem;
      text-align: center;
      background: var(--yt-gradient-135) !important;
      border: none !important;
      color: white !important;
      font-weight: 600;
      font-size: 1rem;
      border-radius: var(--pico-border-radius);
      text-decoration: none;
      transition: opacity 0.15s, transform 0.1s;
      cursor: pointer;
    }
    .btn-gradient:hover { opacity: 0.85; transform: translateY(-1px); color: white !important; }
    .btn-gradient:active { transform: translateY(0); }

    .flash-error {
      background: #fde8ea;
      color: #8b1a25;
      border: 1px solid #f7bdc2;
      padding: 0.75rem 1rem;
      border-radius: var(--pico-border-radius);
      margin-top: 1rem;
      font-size: 0.9rem;
    }
    [data-theme="dark"] .flash-error {
      background: #2a0d12;
      color: #f08090;
      border-color: #4a1a22;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-brand">
      <img class="brand-logo" src="/static/ytdlfin-icon.png" alt="ytdlfin logo" width="96" height="96" style="border-radius:16px" />
      <div class="brand-name">
        <span class="brand-ytdl">ytdl</span><span class="brand-fin">fin</span>
      </div>
      <p class="tagline">Downloads for <span class="jellyfin-ref">Jellyfin</span></p>
    </div>

    <div class="login-card">
      <a href="/auth/login" class="btn-gradient">Sign in with PocketID</a>
      {% if error %}
      <div class="flash-error">{{ error }}</div>
      {% endif %}
    </div>
  </div>
</body>
</html>
