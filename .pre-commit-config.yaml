repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
        exclude: ^images/
      - id: check-json
      - id: check-yaml

  - repo: local
    hooks:
      - id: nixfmt
        name: nixfmt
        entry: nix
        language: system
        types: [nix]
        pass_filenames: false
        args: ["fmt"]

      - id: deadnix
        name: deadnix
        entry: nix run nixpkgs#deadnix --
        language: system
        types: [nix]
        pass_filenames: true

      - id: css-sync-check
        name: ytdlfin.css — app and docs copies must be identical
        entry: bash
        args: ["-c", "diff -q ytdlfin/static/ytdlfin.css docs/ytdlfin.css || (echo 'ytdlfin/static/ytdlfin.css and docs/ytdlfin.css differ — copy one to the other'; exit 1)"]
        language: system
        pass_filenames: false
        always_run: true
