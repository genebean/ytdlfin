name: CI

on:
  pull_request:

jobs:
  pre-commit:
    uses: genebean/.github/.github/workflows/pre-commit-nix.yml@main

  nix-build:
    uses: genebean/.github/.github/workflows/nix-build.yml@main
    with:
      nixos-config-test: true

  sri-check:
    name: SRI hash check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - name: verify CDN SRI hashes
        run: nix run .#check-sri

  css-sync:
    name: css sync check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: verify app and docs CSS are identical
        run: diff ytdlfin/static/ytdlfin.css docs/ytdlfin.css

  dependency-review:
    name: dependency review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v5.0.0

  pytest:
    name: pytest
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - name: run tests
        run: nix develop --command pytest tests/ -v --junitxml=pytest-results.xml
      - name: publish test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: pytest results
          path: pytest-results.xml
          reporter: java-junit
