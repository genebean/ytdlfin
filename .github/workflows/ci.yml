name: CI

on:
  pull_request:

jobs:
  css-sync:
    name: css sync check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: verify app and docs CSS are identical
        run: diff ytdlfin/static/ytdlfin.css docs/ytdlfin.css

  pre-commit:
    name: pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - uses: pre-commit/action@v3.0.1

  dependency-review:
    name: dependency review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v5.0.0

  pytest:
    name: pytest
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - name: run tests
        run: nix develop --command pytest tests/ -v --junitxml=pytest-results.xml
      - name: publish test results
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: pytest results
          path: pytest-results.xml
          reporter: java-junit

  nix-build:
    name: nix build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14
      - uses: DeterminateSystems/flake-checker-action@v12
        with:
          # Fail the PR if nixpkgs is more than 30 days stale.
          # The update-flake-lock workflow keeps it fresh on a weekly cadence.
          fail-mode: true
      - name: nix build
        run: nix build
      - name: NixOS module evaluation (nix build nixosConfigurations.test)
        # Builds a minimal NixOS closure with the ytdlfin module enabled to catch
        # evaluation errors (missing options, type mismatches) without deploying.
        run: nix build .#nixosConfigurations.test.config.system.build.toplevel
