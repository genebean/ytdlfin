name: Publish container image

on:
  push:
    branches: [main]
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

env:
  IMAGE: ghcr.io/genebean/ytdlfin

jobs:
  build-push:
    name: Build (${{ matrix.nix-system }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            nix-system: x86_64-linux
            tag-suffix: amd64
          - runner: ubuntu-24.04-arm
            nix-system: aarch64-linux
            tag-suffix: arm64

    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: DeterminateSystems/magic-nix-cache-action@v14

      # Strip the leading 'v' and write to GITHUB_OUTPUT using only GitHub's
      # own GITHUB_REF / GITHUB_REF_NAME env vars — no user-controlled input.
      - name: Determine version (tag builds only)
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build OCI archive
        run: nix build .#packages.${{ matrix.nix-system }}.container

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Use env: to avoid interpolating step outputs directly into run scripts.
      - name: Push platform image (latest)
        env:
          TAG_SUFFIX: ${{ matrix.tag-suffix }}
        run: |
          sudo skopeo copy \
            --authfile "${HOME}/.docker/config.json" \
            oci-archive:result \
            "docker://${IMAGE}:latest-${TAG_SUFFIX}"

      - name: Push platform image (version tag)
        if: steps.meta.outputs.version != ''
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          TAG_SUFFIX: ${{ matrix.tag-suffix }}
        run: |
          sudo skopeo copy \
            --authfile "${HOME}/.docker/config.json" \
            oci-archive:result \
            "docker://${IMAGE}:${VERSION}-${TAG_SUFFIX}"

  merge-manifest:
    name: Merge multi-arch manifest
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Determine version (tag builds only)
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push latest manifest
        run: |
          docker manifest create "${IMAGE}:latest" \
            --amend "${IMAGE}:latest-amd64" \
            --amend "${IMAGE}:latest-arm64"
          docker manifest push "${IMAGE}:latest"

      - name: Create and push version manifest
        if: steps.meta.outputs.version != ''
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          docker manifest create "${IMAGE}:${VERSION}" \
            --amend "${IMAGE}:${VERSION}-amd64" \
            --amend "${IMAGE}:${VERSION}-arm64"
          docker manifest push "${IMAGE}:${VERSION}"
